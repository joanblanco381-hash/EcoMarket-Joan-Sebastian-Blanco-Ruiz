<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard</title>
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dash.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animaciones.css">
</head>

<body>
    <main>
        <header>
            <div class="logo-1">
                <img src="../img/logo1.jpeg" alt="logo-ecomarket" class="logo-img">
                <h1 class="logo-texto">EcoMarket</h1>
            </div>
            <nav>
                <a href="../index.html">Inicio</a>
                <a href="../viwes/productos.html">Productos</a>
                <a href="../viwes/contacto.html">Contacto</a>
                <a href="../viwes/nosotros.html">nosotros</a>
                <a href="../viwes/dashboard.html">dashboard</a>
            </nav>
            <div class="iconos-header">
                <img src="../img/lupa.png" alt="lupa-img">
                <img src="../img/personita..png" alt="persona-img">
                <img src="../img/carrito.png" alt="carrito-img">
            </div>
        </header>
        <section>
            <div class="perfil-card">
    
                <div class="perfil-cabecera">
                    <img src="https://cdn-images.livecareer.es/pages/4_ejemplo_luz_perfecta_1.jpg" alt="Avatar de usuario"
                        class="avatar">
                    <div class="usuario-info">
                        <h2>Carlos Mendoza</h2>
                        <p>Miembro EcoMarket desde 2024</p>
                    </div>
                </div>
        
                <div class="seccion-estadisticas">
        
                    <div class="metrica">
                        <div class="metrica-info">
                            <span>Árboles Plantados</span>
                            <span class="porcentaje">12 / 20</span>
                        </div>
                        <div class="barra-progreso">
                            <div class="progreso-relleno" style="width: 60%;"></div>
                        </div>
                    </div>
        
                    <div class="metrica">
                        <div class="metrica-info">
                            <span>CO2 Ahorrado</span>
                            <span class="porcentaje">450 kg</span>
                        </div>
                        <div class="barra-progreso">
                            <div class="progreso-relleno" style="width: 80%;"></div>
                        </div>
                    </div>
        
                    <div class="metrica">
                        <div class="metrica-info">
                            <span>Eco-Points Acumulados</span>
                            <span class="porcentaje">1,250</span>
                        </div>
                        <div class="barra-progreso">
                            <div class="progreso-relleno" style="width: 40%;"></div>
                        </div>
                    </div>
                    <div class="metrica">
                        <div class="metrica-info">
                            <span>Agua ahorrada</span>
                            <span class="porcentaje">3200L/6400L</span>
        
                        </div>
                        <div class="barra-progreso">
                            <div class="progreso-relleno" style="width: 50%;"></div>
        
                        </div>
        
                    </div>
                    <div class="metrica">
                        <div class="metrica-info">
                            <span>Energia limpia apoyada</span>
                            <span class="porcentaje">120 kWh</span>
                        </div>
                        <div class="barra-progreso">
                            <div class="progreso-relleno" style="width: 60%;"></div>
        
                        </div>
                    </div>            
        
                </div>
        
                <button class="btn-reporte">Ver Reporte Completo →</button>
        
            </div>
        </section>
    
    </main>
</body>

</html>
</body>

</html>
